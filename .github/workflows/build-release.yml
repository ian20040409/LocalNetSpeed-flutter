name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.2.0). Leave empty to read from pubspec.yaml'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── iOS (no-codesign) ──────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r LocalNetSpeed-iOS.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: LocalNetSpeed-iOS.ipa

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Zip macOS .app
        run: |
          cd build/macos/Build/Products/Release
          APP=$(ls -d *.app | head -1)
          zip -r localnetspeed-macos.zip "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/localnetspeed-macos.zip

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Zip Windows build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath localnetspeed-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: localnetspeed-windows.zip

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Create tar.gz
        run: |
          tar -czf localnetspeed-linux.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: localnetspeed-linux.tar.gz

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            RAW=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
            # strip build-number suffix (e.g. 1.0.0+8 → 1.0.0)
            TAG="v${RAW%%+*}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Release ${{ steps.ver.outputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/ios-ipa/LocalNetSpeed-iOS.ipa
            artifacts/macos-app/localnetspeed-macos.zip
            artifacts/windows-zip/localnetspeed-windows.zip
            artifacts/linux-tar/localnetspeed-linux.tar.gz
